<style>
:root{
  --ink:#e8e8ea;
  --ink-soft:#b8b8bf;
  --paper:#1b1c1f;
  --paper-dim:#232428;
  --card:#202124;
  --row-alt:#1e1f22;
  --violet:#6b84e7;
  --violet-dim:rgba(107,132,231,0.16);
  --coral:#ff4fa8;
  --coral-dim:rgba(255,79,168,0.14);
  --mint:#2fd189;
  --mint-dim:rgba(47,209,137,0.14);
  --amber:#e0ab2e;
  --amber-dim:rgba(224,171,46,0.14);
  --yellow:#f5cf1b;
  --line:rgba(255,255,255,0.08);
  --line-strong:rgba(255,255,255,0.16);
  --text:#eceef2;
  --text-dim:#9294a0;
  --radius:10px;
  --shadow:0 1px 2px rgba(0,0,0,0.2), 0 6px 20px -12px rgba(0,0,0,0.5);
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  font-family:'Sora',system-ui,sans-serif;
  background:var(--paper);
  color:var(--text);
  -webkit-font-smoothing:antialiased;
}
h1,h2,h3,.display{font-family:'Sora',system-ui,sans-serif;letter-spacing:-0.01em;}
.mono{font-family:'Sora',system-ui,sans-serif;font-variant-numeric:tabular-nums;font-feature-settings:"tnum" 1;}
button{font-family:inherit;cursor:pointer;}
input,select,textarea{font-family:'Sora',system-ui,sans-serif;font-size:14px;}
::selection{background:var(--violet);color:#fff;}

#app{display:flex;min-height:100vh;}

/* Sidebar */
.sidebar{
  width:236px;flex-shrink:0;background:#0a0e1d;color:var(--ink);
  display:flex;flex-direction:column;padding:22px 16px;gap:22px;
  position:sticky;top:0;height:100vh;border-right:1px solid var(--line);
  overflow:hidden;
}
.brand{display:flex;flex-direction:column;align-items:center;text-align:center;gap:9px;padding:6px 6px 20px;border-bottom:1px solid var(--line);}
.paradox-mini-logo{height:44px;width:auto;cursor:pointer;opacity:0.92;transition:opacity .15s;}
.paradox-mini-logo:hover{opacity:1;}
.pdx-wordmark{font-family:'Sora';font-weight:800;font-size:32px;line-height:1;letter-spacing:-0.02em;cursor:pointer;}
.pdx-wordmark .px{color:#ffffff;}
.pdx-wordmark .sp{color:#6b84e7;}
.pdx-tagline{font-size:11px;color:#9296a8;font-weight:500;letter-spacing:0.01em;}
.pdx-tagline .dot{color:#6b84e7;}
.nav-label{font-size:10px;font-weight:700;letter-spacing:0.08em;color:#565b6e;text-transform:uppercase;padding:0 11px;margin-bottom:2px;}
nav{display:flex;flex-direction:column;gap:1px;}
.nav-btn{
  display:flex;align-items:center;gap:11px;padding:9px 11px 9px 13px;border-radius:7px;
  background:transparent;border:none;border-left:2px solid transparent;color:#8b8fa3;text-align:left;
  font-size:13.5px;font-weight:600;transition:background .15s,color .15s,border-color .15s;
}
.nav-btn:hover{background:rgba(255,255,255,0.045);color:#e8e8ea;}
.nav-btn.active{background:rgba(107,132,231,0.14);color:#a9b8f5;border-left-color:#6b84e7;}
.nav-btn.active svg{color:#6b84e7;}
.nav-btn svg{width:16px;height:16px;flex-shrink:0;}
.sidebar-footer{margin-top:auto;border-top:1px solid var(--line);padding-top:14px;}
.user-chip{display:flex;align-items:center;justify-content:space-between;gap:8px;background:rgba(255,255,255,0.035);border:1px solid var(--line);border-radius:9px;padding:8px 10px;cursor:pointer;transition:background .15s,border-color .15s;}
.user-chip:hover{background:rgba(255,255,255,0.07);border-color:var(--line-strong);}
.user-chip-hint{display:flex;color:#565b6e;flex-shrink:0;transition:color .15s;}
.user-chip:hover .user-chip-hint{color:#a9b8f5;}
.user-chip .who{display:flex;align-items:center;gap:9px;font-size:12.5px;color:#c7c9d4;font-weight:600;}
.avatar{width:26px;height:26px;border-radius:7px;background:linear-gradient(155deg,#6b84e7,#4c5fc9);color:#fff;display:flex;align-items:center;justify-content:center;font-size:10.5px;font-weight:700;flex-shrink:0;}
.link-btn{background:none;border:none;color:#565b6e;font-size:11px;text-decoration:none;padding:0;margin-top:8px;display:inline-block;}
.link-btn:hover{color:#a9b8f5;text-decoration:underline;}
.sidebar-watermark{
  position:absolute;right:-220px;bottom:79px;width:500px;height:auto;
  opacity:0.02;filter:invert(1) brightness(1.6);
  -webkit-mask-image:linear-gradient(to bottom, transparent 0%, transparent 8%, black 40%, black 100%);
  mask-image:linear-gradient(to bottom, transparent 0%, transparent 8%, black 40%, black 100%);
  pointer-events:none;z-index:0;
}

/* Main */
.main{flex:1;min-width:0;display:flex;flex-direction:column;}
.topbar{
  padding:20px 30px;border-bottom:1px solid var(--line);
  display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;
  background:var(--paper);position:sticky;top:0;z-index:5;
}
.topbar h1{font-size:20px;margin:0;font-weight:800;letter-spacing:-0.01em;}
.topbar .sub{font-size:12.5px;color:var(--text-dim);margin-top:2px;font-weight:500;}
.topbar-actions{display:flex;gap:10px;align-items:center;}
.view-root{padding:24px 30px 60px;}

.btn{
  border:1px solid var(--line-strong);background:var(--card);color:var(--text);
  padding:8px 15px;border-radius:8px;font-size:13px;font-weight:600;
  display:inline-flex;align-items:center;gap:7px;transition:transform .1s, border-color .15s;
}
.btn:hover{border-color:var(--ink);}
.btn:active{transform:scale(0.97);}
.btn-primary{background:var(--violet);border-color:var(--violet);color:#fff;}
.btn-primary:hover{background:#8f86ff;border-color:#8f86ff;}
.btn-ghost{border-color:transparent;background:transparent;}
.btn-ghost:hover{background:var(--paper-dim);border-color:transparent;}
.btn-danger{color:var(--coral);}
.btn-sm{padding:6px 11px;font-size:12.5px;border-radius:8px;}
.icon-btn{width:32px;height:32px;border-radius:8px;display:inline-flex;align-items:center;justify-content:center;border:1px solid var(--line-strong);background:var(--card);color:var(--violet);}
.icon-btn:hover{background:var(--violet-dim);}
.icon-btn:hover{border-color:var(--ink);}
.icon-btn svg{width:15px;height:15px;}

/* Stat cards */
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:26px;}
.stat-card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:18px 18px 16px;box-shadow:var(--shadow);}
.stat-card .num{font-family:'Sora',system-ui,sans-serif;font-variant-numeric:tabular-nums;font-size:30px;font-weight:800;line-height:1;}
.stat-card .lbl{font-size:12.5px;color:var(--text-dim);margin-top:8px;font-weight:500;}
.stat-card.alert .num{color:var(--coral);}

.section-title{display:flex;align-items:center;justify-content:space-between;margin:0 0 12px;}
.section-title h2{font-size:15.5px;font-weight:700;margin:0;}
.section-title .count-pill{font-size:11.5px;background:var(--paper-dim);color:var(--text-dim);padding:2px 8px;border-radius:99px;font-weight:600;}

.panel{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;margin-bottom:26px;}
.followup-row{display:flex;align-items:center;gap:14px;padding:13px 18px;border-bottom:1px solid var(--line);}
.followup-row:last-child{border-bottom:none;}
.followup-row:hover{background:var(--paper-dim);cursor:pointer;}
.followup-row .fname{font-weight:600;font-size:13.5px;flex:1;min-width:0;}
.followup-row .fname small{display:block;font-weight:400;color:var(--text-dim);font-size:12px;margin-top:1px;}
.wait-badge{font-size:11.5px;font-weight:700;padding:3px 9px;border-radius:99px;font-family:'Sora';font-variant-numeric:tabular-nums;flex-shrink:0;}
.wait-badge.w-hot{background:var(--coral-dim);color:var(--coral);}
.wait-badge.w-warm{background:var(--amber-dim);color:var(--amber);}
.wait-badge.w-cool{background:var(--paper-dim);color:var(--text-dim);}

.empty-state{padding:40px 20px;text-align:center;color:var(--text-dim);}
.empty-state svg{width:40px;height:40px;opacity:.35;margin-bottom:10px;}
.empty-state p{font-size:13.5px;margin:0;}

/* Filters bar */
.filters-bar{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:16px;}
.filters-bar select, .filters-bar input[type=text]{
  border:1px solid var(--line-strong);border-radius:9px;padding:8px 12px;background:var(--card);font-size:13px;color:var(--text);
}
.filters-bar input[type=text]{min-width:220px;}

/* Table */
table{width:100%;border-collapse:collapse;table-layout:fixed;}
thead th{text-align:left;font-size:10.5px;text-transform:uppercase;letter-spacing:.05em;color:var(--text-dim);font-weight:700;padding:10px 12px;border-bottom:2px solid var(--line-strong);background:var(--paper-dim);}
tbody td{padding:10px 12px;border-bottom:1px solid var(--line-strong);font-size:13px;vertical-align:middle;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
tbody tr:nth-child(even){background:var(--row-alt);}
tbody tr:nth-child(even) td{border-bottom-color:rgba(255,255,255,0.05);}
tbody tr:last-child td{border-bottom:none;}
tbody tr:hover{background:var(--paper-dim);cursor:pointer;}
.gname{font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.gname small{display:block;font-weight:500;color:var(--text-dim);font-size:11.5px;margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
col.col-grupo{width:38%;}
col.col-tipo{width:20%;}
col.col-estado{width:19%;}
col.col-fecha{width:18%;}
col.col-pax{width:9%;}
col.col-arrow{width:28px;}

.pill{display:inline-flex;align-items:center;max-width:100%;overflow:hidden;text-overflow:ellipsis;font-size:11px;font-weight:700;padding:3px 9px;border-radius:6px;white-space:nowrap;}
.pill-tipo{background:var(--violet-dim);color:var(--violet);}
.pill-nuevo{background:var(--paper-dim);color:var(--text-dim);}
.pill-contactado{background:var(--amber-dim);color:var(--amber);}
.pill-confirmado{background:var(--mint-dim);color:var(--mint);}
.pill-realizado{background:var(--violet-dim);color:var(--violet);}
.pill-cancelado{background:var(--coral-dim);color:var(--coral);}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(10,10,10,0.55);display:flex;align-items:flex-start;justify-content:center;padding:40px 16px;overflow-y:auto;z-index:50;}
.modal{background:var(--card);border-radius:14px;width:100%;max-width:640px;box-shadow:0 20px 60px -20px rgba(0,0,0,0.45);animation:pop .15s ease-out;}
@keyframes pop{from{opacity:0;transform:translateY(6px) scale(.98);}to{opacity:1;transform:none;}}
.modal-head{display:flex;align-items:flex-start;justify-content:space-between;padding:20px 24px;border-bottom:1px solid var(--line);gap:12px;}
.modal-head h2{font-size:18px;margin:0;}
.modal-body{padding:22px 24px;max-height:70vh;overflow-y:auto;}
.modal-foot{padding:16px 24px;border-top:1px solid var(--line);display:flex;justify-content:flex-end;gap:10px;}
.field{margin-bottom:15px;}
.field label{display:block;font-size:12.5px;font-weight:600;color:var(--text-dim);margin-bottom:6px;}
.field input, .field select, .field textarea{
  width:100%;border:1px solid var(--line-strong);border-radius:9px;padding:9px 12px;background:var(--paper);color:var(--text);
}
.field textarea{resize:vertical;min-height:64px;}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.checkbox-row{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--text);}
.checkbox-row input{width:auto;}
.tag-pill{display:inline-flex;align-items:center;gap:5px;font-size:11.5px;font-weight:600;padding:4px 6px 4px 10px;border-radius:99px;background:var(--paper-dim);color:var(--text);border:1px solid var(--line-strong);}
.tag-pill button{background:none;border:none;color:var(--text-dim);font-size:14px;line-height:1;cursor:pointer;padding:0 2px;}
.tag-pill button:hover{color:var(--coral);}
.tag-pill.tag-neg{background:var(--coral-dim);color:var(--coral);border-color:transparent;}
.tag-pill.tag-warn{background:var(--amber-dim);color:var(--amber);border-color:transparent;}
.captura-thumb{position:relative;width:96px;height:96px;border-radius:8px;overflow:hidden;background:var(--paper-dim);border:1px solid var(--line);flex-shrink:0;}
.captura-thumb img{width:100%;height:100%;object-fit:cover;display:block;}
.captura-loading{width:100%;height:100%;display:flex;align-items:center;justify-content:center;color:var(--text-dim);font-size:12px;}
.captura-del{position:absolute;top:4px;right:4px;width:20px;height:20px;border-radius:6px;background:rgba(10,10,10,0.65);border:none;color:#fff;display:flex;align-items:center;justify-content:center;}
.captura-del svg{width:10px;height:10px;}
.captura-del:hover{background:var(--coral);}

.week-cal{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:16px 18px;margin-bottom:26px;cursor:pointer;transition:border-color .15s;}
.week-cal:hover{border-color:var(--violet);}
.week-cal-head{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;margin-bottom:14px;}
.week-cal-head h2{font-size:15.5px;font-weight:700;margin:0;display:flex;align-items:center;gap:8px;}
.week-cal-head h2 svg{width:16px;height:16px;color:var(--violet);}
.week-cal-nav{display:flex;align-items:center;gap:8px;}
.week-cal-range{font-size:12.5px;color:var(--text-dim);font-family:'Sora';font-variant-numeric:tabular-nums;margin-right:4px;}
.week-cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:8px;}
.cal-day{border:1px solid var(--line);border-radius:10px;overflow:hidden;background:var(--paper);min-height:120px;}
.cal-day.cal-today{border-color:var(--violet);box-shadow:0 0 0 1px var(--violet);}
.cal-day-head{font-size:11px;font-weight:700;padding:7px 10px;background:var(--violet-dim);display:flex;justify-content:space-between;color:var(--violet);letter-spacing:.01em;}
.cal-day.cal-weekend .cal-day-head{background:var(--amber-dim);color:var(--amber);}
.cal-day.cal-today .cal-day-head{background:var(--violet);color:#fff;}
.cal-day-body{padding:8px;display:flex;flex-direction:column;gap:6px;background:var(--card);}
.cal-visit{background:var(--paper);border:1px solid var(--line-strong);border-radius:7px;padding:6px 8px;cursor:pointer;font-size:11.5px;}
.cal-visit:hover{border-color:var(--violet);}
.cal-time{display:block;font-family:'Sora';font-weight:700;color:var(--violet);font-variant-numeric:tabular-nums;font-size:11px;}
.cal-name{display:block;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.cal-empty{font-size:11px;color:var(--text-dim);opacity:.6;padding:4px 2px;}
@media (max-width:860px){
  .week-cal-grid{grid-template-columns:1fr;}
}
.campaign-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:14px;}
.campaign-card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:18px;cursor:pointer;transition:border-color .15s;}
.campaign-card:hover{border-color:var(--violet);}
.campaign-name{font-family:'Sora';font-weight:700;font-size:15px;}
.campaign-year{font-size:12px;color:var(--text-dim);margin-top:2px;}
.campaign-tipos{display:flex;flex-wrap:wrap;gap:6px;margin:12px 0 16px;}
.campaign-stats{display:flex;gap:18px;border-top:1px solid var(--line);padding-top:12px;}
.campaign-stats div{display:flex;flex-direction:column;}
.campaign-stats b{font-family:'Sora';font-size:18px;font-weight:800;}
.campaign-stats span{font-size:10.5px;color:var(--text-dim);text-transform:uppercase;letter-spacing:.03em;margin-top:2px;}

.mcal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;}
.mcal-headrow{margin-bottom:6px;}
.mcal-headcell{font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:var(--text-dim);text-align:center;padding:4px 0;}
.mcal-cell{min-height:92px;border:1px solid var(--line);border-radius:8px;padding:6px;background:var(--paper);}
.mcal-cell.mcal-outside{background:transparent;border-color:transparent;}
.mcal-cell.mcal-today{border-color:var(--violet);background:var(--violet-dim);}
.mcal-daynum{font-family:'Sora';font-size:12px;font-weight:700;color:var(--text-dim);margin-bottom:4px;}
.mcal-today .mcal-daynum{color:var(--violet);}
.mcal-visits{display:flex;flex-direction:column;gap:3px;}
.mcal-visit{font-size:10.5px;background:var(--card);border:1px solid var(--line-strong);border-radius:5px;padding:2px 5px;cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.mcal-visit:hover{border-color:var(--violet);}
.mcal-time{font-family:'Sora';font-weight:700;color:var(--violet);margin-right:3px;}
.mcal-more{font-size:10px;color:var(--text-dim);padding:1px 5px;}
@media (max-width:860px){
  .mcal-grid{grid-template-columns:repeat(7,minmax(34px,1fr));}
  .mcal-cell{min-height:60px;padding:3px;}
  .mcal-visit{display:none;}
  .mcal-more{display:block;}
}

/* Detail modal specifics */
.detail-header{display:flex;align-items:flex-start;justify-content:space-between;gap:14px;}
.detail-tags{display:flex;gap:8px;margin-top:8px;flex-wrap:wrap;align-items:center;}
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px 16px;margin:18px 0;padding:16px;background:var(--paper);border-radius:12px;}
.detail-grid .k{font-size:11px;color:var(--text-dim);font-weight:600;text-transform:uppercase;letter-spacing:.03em;}
.detail-grid .v{font-size:13.5px;margin-top:2px;}
.detail-grid .v a{color:var(--violet);text-decoration:none;}
.tabs{display:flex;gap:4px;border-bottom:1px solid var(--line);margin:18px 0 14px;}
.tab-btn{background:none;border:none;padding:9px 4px;font-size:13px;font-weight:600;color:var(--text-dim);border-bottom:2px solid transparent;margin-right:16px;}
.tab-btn.active{color:var(--ink);border-color:var(--violet);}

.timeline{display:flex;flex-direction:column;gap:0;}
.tl-item{display:flex;gap:12px;padding:12px 0;border-bottom:1px solid var(--line);}
.tl-item:last-child{border-bottom:none;}
.tl-ico{width:30px;height:30px;border-radius:9px;background:var(--paper-dim);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.tl-ico svg{width:14px;height:14px;color:var(--ink-soft);}
.tl-body{flex:1;min-width:0;}
.tl-top{display:flex;justify-content:space-between;gap:8px;align-items:baseline;}
.tl-top .who{font-size:13px;font-weight:600;}
.tl-top .when{font-size:11.5px;color:var(--text-dim);font-family:'Sora';font-variant-numeric:tabular-nums;flex-shrink:0;}
.tl-note{font-size:13px;color:var(--text-dim);margin-top:3px;line-height:1.4;}
.tl-flag{display:inline-block;margin-top:5px;font-size:11px;font-weight:700;color:var(--coral);}

.quick-log{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;}

.name-gate{position:fixed;inset:0;background:#050505;display:flex;align-items:center;justify-content:center;z-index:100;}
.name-card{background:var(--card);padding:34px;border-radius:14px;max-width:380px;width:90%;text-align:center;}
.name-card .gate-mark{width:84px;height:84px;margin:0 auto 16px;border-radius:10px;overflow:hidden;}
.name-card .gate-mark img{width:100%;height:100%;object-fit:cover;display:block;}
.name-card h2{margin:0 0 6px;font-size:18px;font-weight:800;}
.name-card p{color:var(--text-dim);font-size:13px;margin:0 0 18px;line-height:1.5;}
.user-picker{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.user-pick-btn{display:flex;align-items:center;gap:9px;padding:11px 14px;border-radius:10px;border:1px solid var(--line-strong);background:var(--paper);color:var(--text);font-size:13.5px;font-weight:600;transition:border-color .15s,background .15s,transform .1s;}
.user-pick-btn:hover{border-color:var(--violet);background:var(--violet-dim);}
.user-pick-btn:active{transform:scale(0.97);}
.upb-avatar{width:26px;height:26px;border-radius:7px;background:linear-gradient(155deg,#6b84e7,#4c5fc9);color:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;}

.hidden{display:none !important;}
.about-hero{background:#0a0e1d;border-radius:16px;padding:56px 48px;max-width:760px;}
.about-mini-logo{margin-bottom:40px;}
.about-mini-logo img{height:52px;display:block;filter:invert(1) brightness(1.6);}
.about-wordmark{font-family:'Sora';font-weight:800;font-size:64px;line-height:1;letter-spacing:-0.03em;margin-bottom:20px;}
.about-wordmark .px{color:#ffffff;}
.about-wordmark .sp{color:#6b84e7;}
.about-tagline{font-size:26px;font-weight:500;color:#a3a8b5;letter-spacing:-0.01em;}
.about-tagline .dot{color:#6b84e7;}
.about-rule{width:48px;height:3px;background:#6b84e7;border-radius:2px;margin:28px 0 26px;}
.about-desc{font-size:14.5px;line-height:1.6;color:#a3a8b5;max-width:520px;margin:0 0 44px;}
.about-features{display:grid;grid-template-columns:repeat(3,1fr);gap:28px;}
.about-feature-icon{width:26px;height:26px;color:#6b84e7;margin-bottom:14px;}
.about-feature-icon svg{width:100%;height:100%;}
.about-feature-title{font-family:'Sora';font-weight:700;font-size:14.5px;color:#fff;margin-bottom:6px;}
.about-feature-desc{font-size:12.5px;line-height:1.5;color:#8b8f9c;}
@media (max-width:860px){
  .sidebar{position:fixed;left:0;bottom:0;top:auto;width:100%;height:auto;flex-direction:row;align-items:center;padding:10px 14px;z-index:20;justify-content:space-between;}
  .sidebar .brand,.sidebar-footer{display:none;}
  nav{flex-direction:row;flex:1;justify-content:space-around;}
  .nav-btn span{display:none;}
  .main{padding-bottom:64px;}
  .topbar,.view-root{padding-left:18px;padding-right:18px;}
  .stats-grid{grid-template-columns:1fr 1fr;}
  .field-row,.detail-grid{grid-template-columns:1fr;}
  .about-hero{padding:36px 24px;}
  .about-wordmark{font-size:40px;}
  .about-tagline{font-size:18px;}
  .about-features{grid-template-columns:1fr;}
}
</style>
</head>

/* ---------- Almacenamiento (Supabase, tabla pdxspot_kv) ----------
   Sustituye a window.storage. Namespaced con prefijo 'pdxspot:' para
   no chocar con otras claves del mismo proyecto Supabase compartido
   con el resto del HUB. */
async function kvGet(key){
  const { data, error } = await sb.from('pdxspot_kv').select('value').eq('key', 'pdxspot:'+key).maybeSingle();
  if(error){ console.error(error); return null; }
  return data ? { value: data.value } : null;
}
async function kvSet(key, value){
  const { error } = await sb.from('pdxspot_kv').upsert({ key: 'pdxspot:'+key, value }, {onConflict:'key'});
  if(error){ console.error(error); return null; }
  return true;
}
async function kvDelete(key){
  const { error } = await sb.from('pdxspot_kv').delete().eq('key', 'pdxspot:'+key);
  if(error){ console.error(error); return null; }
  return true;
}

/* ---------- Storage ---------- */
async function loadUser(){
  try{
    const r = await kvGet(USER_KEY);
    if(r && r.value) userName = r.value;
  }catch(e){ userName = null; }
}
async function saveUser(name){
  userName = name;
  try{ await kvSet(USER_KEY, name); }catch(e){ console.error('No se pudo guardar el nombre', e); }
}
async function loadData(){
  try{
    const r = await kvGet(STORAGE_KEY);
    if(r && r.value){
      const parsed = JSON.parse(r.value);
      state.groups = parsed.groups || [];
      state.categories = (parsed.categories && parsed.categories.length) ? parsed.categories : DEFAULT_CATEGORIES.slice();
      state.importDone = !!parsed.importDone;
      state.autoRules = parsed.autoRules || [];
      state.campaigns = parsed.campaigns || [];
    }
  }catch(e){
    state = { groups: [], categories: DEFAULT_CATEGORIES.slice(), importDone: false, autoRules: [], campaigns: [] };
    await saveData();
  }
  dataVersionLoaded = true;
}
async function saveData(){
  try{
    const res = await kvSet(STORAGE_KEY, JSON.stringify(state));
    if(!res) console.error('Guardado falló (sin resultado)');
  }catch(e){ console.error('Error guardando datos', e); alert('No se han podido guardar los cambios. Inténtalo de nuevo.'); }
}

/* ---------- Init ---------- */
async function init(){
  // Si el HUB nos empotra en un iframe, nos pasa el usuario ya identificado
  // por su propio login (Supabase Auth) vía ?pdxUser=Nombre — así no hace
  // falta volver a preguntar quién eres dentro de PDXspot.
  const params = new URLSearchParams(location.search);
  const hubUser = params.get('pdxUser');
  if(hubUser){
    await saveUser(hubUser);
    await startApp();
    return;
  }
  await loadUser();
  if(!userName){
    $('#name-gate').classList.remove('hidden');
    $('#name-input').addEventListener('keydown', e=>{ if(e.key==='Enter') setUserName(); });
    return;
  }
  await startApp();
}
async function setUserName(){
  const v = $('#name-input').value.trim();
  if(!v) return;
  await saveUser(v);
  $('#name-gate').classList.add('hidden');
  await startApp();
}
async function selectPredefinedUser(name){
  await saveUser(name);
  $('#name-gate').classList.add('hidden');
  await startApp();
}

/* ---------- View routing ---------- */
function setView(view){
  currentView = view;
  $$('.nav-btn').forEach(b => b.classList.toggle('active', b.dataset.view===view));
  if(view==='dashboard') renderDashboard();
  if(view==='calendario') renderCalendario();
  if(view==='grupos') renderGrupos();
  if(view==='cumpleanos') renderCumpleanos();
  if(view==='visitas') renderVisitas();
  if(view==='campanas') renderCampanas();
  if(view==='acerca') renderAcerca();
}

/* ---------- Derived data ---------- */
function lastInteraction(g){
  if(!g.interacciones || !g.interacciones.length) return null;
  return g.interacciones[g.interacciones.length-1];
}
function daysSince(dateStr){
  const d = new Date(dateStr);
  const diff = Math.floor((Date.now() - d.getTime()) / 86400000);
  return diff;
}
function pendientes(){
  return state.groups.filter(g => g.esperandoRespuesta).sort((a,b)=> daysSince(b.ultimoContacto||b.createdAt) - daysSince(a.ultimoContacto||a.createdAt));
}
function waitBadgeClass(days){
  if(days>=5) return 'w-hot';
  if(days>=2) return 'w-warm';
  return 'w-cool';
}

/* ---------- Calendario semanal ---------- */
function mondayOfWeek(offsetWeeks){
  const now = new Date();
  const day = now.getDay(); // 0=Dom..6=Sab
  const diffToMonday = (day===0 ? -6 : 1-day);
  const monday = new Date(now.getFullYear(), now.getMonth(), now.getDate()+diffToMonday+offsetWeeks*7);
  return monday;
}
function isoDate(d){
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
function weekCalendarHtml(){
  const monday = mondayOfWeek(calendarWeekOffset);
  const todayStr = isoDate(new Date());
  const dayNames = ['Lunes','Martes','Miércoles','Jueves','Viernes','Sábado','Domingo'];
  let rangeLabel = '';
  const days = [];
  for(let i=0;i<7;i++){
    const d = new Date(monday.getFullYear(), monday.getMonth(), monday.getDate()+i);
    days.push(d);
  }
  rangeLabel = `${days[0].getDate()} ${MESES[days[0].getMonth()].slice(0,3)} – ${days[6].getDate()} ${MESES[days[6].getMonth()].slice(0,3)}`;

  const cols = days.map((d,i)=>{
    const dStr = isoDate(d);
    const isWeekend = i===5 || i===6;
    const visitas = state.groups.filter(g=>g.fechaVisita===dStr).sort((a,b)=>(a.horaVisita||'99:99').localeCompare(b.horaVisita||'99:99'));
    return `<div class="cal-day ${dStr===todayStr?'cal-today':''} ${isWeekend?'cal-weekend':''}" onclick="event.stopPropagation();setView('calendario')">
      <div class="cal-day-head">${dayNames[i]}<span>${d.getDate()} ${MESES[d.getMonth()].slice(0,3)}</span></div>
      <div class="cal-day-body">
        ${visitas.length ? visitas.map(g=>`
          <div class="cal-visit" onclick="event.stopPropagation();openGroupDetail('${g.id}')">
            <span class="cal-time">${g.horaVisita||'—'}</span>
            <span class="cal-name">${esc(g.nombre)}</span>
          </div>
        `).join('') : `<div class="cal-empty">Sin visitas</div>`}
      </div>
    </div>`;
  }).join('');

  return `
    <div class="week-cal" onclick="setView('calendario')" title="Ver calendario completo">
      <div class="week-cal-head">
        <h2><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4.5" width="18" height="16" rx="2"/><path d="M3 9.5h18"/><path d="M8 2.5v4M16 2.5v4"/></svg>Esta semana</h2>
        <div class="week-cal-nav" onclick="event.stopPropagation()">
          <span class="week-cal-range">${rangeLabel}</span>
          <button class="icon-btn" onclick="shiftCalendarWeek(-1)">${chevronIcon('left')}</button>
          <button class="btn btn-sm btn-ghost" onclick="resetCalendarWeek()">Hoy</button>
          <button class="icon-btn" onclick="shiftCalendarWeek(1)">${chevronIcon('right')}</button>
        </div>
      </div>
      <div class="week-cal-grid">${cols}</div>
    </div>
  `;
}
function chevronIcon(dir){
  const d = dir==='left' ? 'M15 18l-6-6 6-6' : 'M9 18l6-6-6-6';
  return `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="${d}"/></svg>`;
}
function shiftCalendarWeek(delta){ calendarWeekOffset += delta; renderDashboard(); }
function resetCalendarWeek(){ calendarWeekOffset = 0; renderDashboard(); }

/* ---------- Calendario mensual ---------- */
function renderCalendario(){
  $('#page-title').textContent = 'Calendario';
  $('#page-sub').textContent = 'Grupos ya confirmados, mes a mes';
  $('#topbar-actions').innerHTML = `<button class="btn btn-primary" onclick="openGroupModal()">${plusIcon()} Nuevo grupo</button>`;

  const now = new Date();
  const base = new Date(now.getFullYear(), now.getMonth()+calendarMonthOffset, 1);
  const year = base.getFullYear(), month = base.getMonth();
  const monthLabel = `${MESES[month]} ${year}`;
  const todayStr = isoDate(new Date());

  const firstDay = new Date(year, month, 1);
  const leading = (firstDay.getDay()+6)%7; // 0=Lunes
  const daysInMonth = new Date(year, month+1, 0).getDate();
  const totalCells = Math.ceil((leading+daysInMonth)/7)*7;

  const confirmados = state.groups.filter(g => g.fechaVisita && (g.estado==='confirmado'||g.estado==='realizado'));
  const byDate = {};
  confirmados.forEach(g=>{ (byDate[g.fechaVisita] = byDate[g.fechaVisita]||[]).push(g); });
  Object.values(byDate).forEach(arr=>arr.sort((a,b)=>(a.horaVisita||'99:99').localeCompare(b.horaVisita||'99:99')));

  let cells = '';
  for(let i=0;i<totalCells;i++){
    const dayNum = i - leading + 1;
    if(dayNum < 1 || dayNum > daysInMonth){
      cells += `<div class="mcal-cell mcal-outside"></div>`;
      continue;
    }
    const d = new Date(year, month, dayNum);
    const dStr = isoDate(d);
    const visitas = byDate[dStr] || [];
    const isToday = dStr === todayStr;
    cells += `<div class="mcal-cell ${isToday?'mcal-today':''}">
      <div class="mcal-daynum">${dayNum}</div>
      <div class="mcal-visits">
        ${visitas.slice(0,3).map(g=>`
          <div class="mcal-visit" onclick="openGroupDetail('${g.id}')" title="${esc(g.nombre)}">
            ${g.horaVisita?`<span class="mcal-time">${g.horaVisita}</span>`:''}${esc(g.nombre)}
          </div>
        `).join('')}
        ${visitas.length>3?`<div class="mcal-more">+${visitas.length-3} más</div>`:''}
      </div>
    </div>`;
  }

  const weekdayHead = ['Lun','Mar','Mié','Jue','Vie','Sáb','Dom'].map(d=>`<div class="mcal-headcell">${d}</div>`).join('');

  $('#view-root').innerHTML = `
    <div class="week-cal-head" style="margin-bottom:14px;">
      <h2 style="font-size:18px;">${monthLabel}</h2>
      <div class="week-cal-nav">
        <button class="icon-btn" onclick="shiftCalendarMonth(-1)">${chevronIcon('left')}</button>
        <button class="btn btn-sm btn-ghost" onclick="resetCalendarMonth()">Hoy</button>
        <button class="icon-btn" onclick="shiftCalendarMonth(1)">${chevronIcon('right')}</button>
      </div>
    </div>
    <div class="panel" style="padding:14px;">
      <div class="mcal-grid mcal-headrow">${weekdayHead}</div>
      <div class="mcal-grid">${cells}</div>
    </div>
    ${!confirmados.length ? `<div style="margin-top:16px;">${emptyState('Sin visitas confirmadas todavía','Cuando un grupo pase a estado Confirmado o Realizado y tenga fecha de visita, aparecerá aquí solo.')}</div>` : ''}
  `;
}
function shiftCalendarMonth(delta){ calendarMonthOffset += delta; renderCalendario(); }
function resetCalendarMonth(){ calendarMonthOffset = 0; renderCalendario(); }

/* ---------- Avisos: manuales + reglas automáticas ---------- */
function avisosPendientes(){
  const todayStr = new Date().toISOString().slice(0,10);
  const thisMonth = new Date().getMonth()+1;
  const out = [];
  const seen = new Set();
  state.groups.forEach(g=>{
    const motivos = [];
    if(g.recordatorioFecha && g.recordatorioFecha <= todayStr){
      motivos.push(`Aviso programado: ${fmtDateFull(g.recordatorioFecha)}`);
    }
    const rule = state.autoRules.find(r=>r.tipo===g.tipo && r.mes===thisMonth);
    if(rule){
      motivos.push(`Regla automática: ${esc(g.tipo)} en ${MESES[rule.mes-1]}`);
    }
    if(motivos.length && !seen.has(g.id)){
      seen.add(g.id);
      out.push({ g, motivo: motivos.join(' · '), tipo: g.recordatorioFecha && g.recordatorioFecha <= todayStr ? 'manual' : 'auto' });
    }
  });
  out.sort((a,b)=> (a.tipo==='manual'?0:1) - (b.tipo==='manual'?0:1));
  return out;
}

  $('#page-sub').textContent = 'Grupos con fecha de visita registrada';
  $('#topbar-actions').innerHTML = `<button class="btn btn-primary" onclick="openGroupModal()">${plusIcon()} Nuevo grupo</button>`;

  const withDate = state.groups.filter(g => g.fechaVisita);
  const todayStr = new Date().toISOString().slice(0,10);
  const proximas = withDate.filter(g => g.fechaVisita >= todayStr).sort((a,b)=> a.fechaVisita.localeCompare(b.fechaVisita));
  const pasadas = withDate.filter(g => g.fechaVisita < todayStr).sort((a,b)=> b.fechaVisita.localeCompare(a.fechaVisita));
  const paxSum = arr => arr.reduce((s,g)=> s + (g.numPersonas||0), 0);

  const rowsHtml = (arr, tag) => arr.map(g => `
    <div class="followup-row" onclick="openGroupDetail('${g.id}')">
      <div style="width:78px;flex-shrink:0;">
        <div class="mono" style="font-weight:700;font-size:13px;">${fmtDate(g.fechaVisita)}</div>
        <div style="font-size:10.5px;color:var(--text-dim);">${weekdayShort(g.fechaVisita)}</div>
      </div>
      <div class="fname">${esc(g.nombre)}<small>${esc(g.tipo)} · ${esc(g.contactoNombre||'sin contacto')}</small></div>
      <span class="pill pill-${g.estado}">${ESTADOS.find(e=>e.id===g.estado)?.label||g.estado}</span>
      <span class="wait-badge w-cool mono" title="Personas">${g.numPersonas ? g.numPersonas+' pax' : '— pax'}</span>
    </div>
  `).join('');

  $('#view-root').innerHTML = `
    <div class="stats-grid">
      <div class="stat-card"><div class="num">${proximas.length}</div><div class="lbl">Próximas visitas</div></div>
      <div class="stat-card"><div class="num">${paxSum(proximas)}</div><div class="lbl">Personas por venir (aprox.)</div></div>
      <div class="stat-card"><div class="num">${pasadas.length}</div><div class="lbl">Visitas realizadas</div></div>
      <div class="stat-card"><div class="num">${paxSum(pasadas)}</div><div class="lbl">Personas recibidas (aprox.)</div></div>
    </div>

    <div class="section-title"><h2>Próximas visitas</h2><span class="count-pill">${proximas.length}</span></div>
    <div class="panel">
      ${proximas.length ? rowsHtml(proximas,'prox') : emptyState('Sin visitas programadas', 'Añade una fecha de visita prevista en la ficha de un grupo para que aparezca aquí.')}
    </div>

    <div class="section-title"><h2>Visitas realizadas</h2><span class="count-pill">${pasadas.length}</span></div>
    <div class="panel">
      ${pasadas.length ? rowsHtml(pasadas,'past') : emptyState('Todavía sin historial', 'Las visitas con fecha pasada aparecerán aquí automáticamente.')}
    </div>
  `;
}
function weekdayShort(d){
  const dt = new Date(d);
  return dt.toLocaleDateString('es-ES', {weekday:'short'}).replace('.','');
}

/* ---------- Cumpleaños ---------- */
function renderCumpleanos(){
  $('#page-title').textContent = 'Cumpleaños';
  const todos = state.groups.filter(g=>g.tipo==='Cumpleaños');
  $('#page-sub').textContent = `${todos.length} cumpleaños registrado${todos.length===1?'':'s'}`;
  $('#topbar-actions').innerHTML = `<button class="btn btn-primary" onclick="openBirthdayModal()">${plusIcon()} Nuevo cumpleaños</button>`;

  const todayStr = isoDate(new Date());
  const monthStr = todayStr.slice(0,7);
  const proximos = todos.filter(g=>g.fechaVisita && g.fechaVisita>=todayStr).sort((a,b)=>a.fechaVisita.localeCompare(b.fechaVisita));
  const esteMes = todos.filter(g=>g.fechaVisita && g.fechaVisita.slice(0,7)===monthStr);
  const confirmados = todos.filter(g=>g.estado==='confirmado');
  const invitadosProximos = proximos.reduce((s,g)=>s+(g.numPersonas||0),0);

  const list = todos.slice().sort((a,b)=>{
    const fa = a.fechaVisita || '9999-99-99';
    const fb = b.fechaVisita || '9999-99-99';
    return fa.localeCompare(fb);
  });

  $('#view-root').innerHTML = `
    <div class="stats-grid">
      <div class="stat-card"><div class="num">${todos.length}</div><div class="lbl">Cumpleaños totales</div></div>
      <div class="stat-card"><div class="num">${proximos.length}</div><div class="lbl">Próximos</div></div>
      <div class="stat-card"><div class="num">${esteMes.length}</div><div class="lbl">Este mes</div></div>
      <div class="stat-card"><div class="num">${confirmados.length}</div><div class="lbl">Confirmados</div></div>
    </div>
    <div class="panel">
      ${list.length ? `<table>
        <colgroup><col class="col-grupo"><col class="col-tipo"><col class="col-estado"><col class="col-fecha"><col class="col-arrow"></colgroup>
        <thead><tr><th>Cumpleañero/a</th><th>Invitados</th><th>Estado</th><th>Fecha</th><th></th></tr></thead>
        <tbody>
          ${list.map(g=>{
            const fecha = g.fechaVisita ? fmtDate(g.fechaVisita)+(g.horaVisita?' · '+g.horaVisita:'') : 'Sin fecha';
            return `<tr onclick="openGroupDetail('${g.id}')">
              <td class="gname">${esc(g.nombre)}<small>${g.edad?('Cumple '+esc(g.edad)+' · '):''}${esc(g.contactoNombre||'sin contacto')}</small></td>
              <td class="mono" style="font-size:12.5px;">${g.numPersonas||'—'}</td>
              <td><span class="pill pill-${g.estado}">${ESTADOS.find(e=>e.id===g.estado)?.label||g.estado}</span></td>
              <td class="mono" style="color:var(--text-dim);font-size:12.5px;">${fecha}</td>
              <td style="text-align:right;color:var(--text-dim);">→</td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>` : emptyState('Sin cumpleaños todavía', 'Crea el primero con "Nuevo cumpleaños" arriba.')}
    </div>
  `;
}
function openBirthdayModal(existing){
  const g = existing || null;
  $('#modal-root').innerHTML = `
    <div class="modal-overlay" onclick="if(event.target===this) closeModal()">
      <div class="modal">
        <div class="modal-head">
          <h2>${g?'Editar cumpleaños':'Nuevo cumpleaños'}</h2>
          <button class="icon-btn" onclick="closeModal()">${closeIcon()}</button>
        </div>
        <div class="modal-body">
          <div class="field-row">
            <div class="field"><label>Nombre del cumpleañero/a</label><input id="b-nombre" type="text" value="${g?esc(g.nombre):''}" placeholder="Ej: Martina"></div>
            <div class="field"><label>Cumple años</label><input id="b-edad" type="number" min="0" value="${g&&g.edad?g.edad:''}" placeholder="8"></div>
          </div>
          <div class="field-row">
            <div class="field"><label>Fecha</label><input id="b-fecha" type="date" value="${g&&g.fechaVisita?g.fechaVisita:''}"></div>
            <div class="field"><label>Hora</label><input id="b-hora" type="time" value="${g&&g.horaVisita?g.horaVisita:''}"></div>
          </div>
          <div class="field-row">
            <div class="field"><label>Nº de invitados</label><input id="b-invitados" type="number" min="0" value="${g&&g.numPersonas?g.numPersonas:''}" placeholder="12"></div>
            <div class="field"><label>Estado</label>
              <select id="b-estado">${ESTADOS.map(e=>`<option value="${e.id}" ${g&&g.estado===e.id?'selected':''}>${e.label}</option>`).join('')}</select>
            </div>
          </div>
          <div class="field-row">
            <div class="field"><label>Contacto (madre/padre/tutor)</label><input id="b-contacto" type="text" value="${g?esc(g.contactoNombre||''):''}" placeholder="Nombre"></div>
            <div class="field"><label>Teléfono</label><input id="b-tel" type="text" value="${g?esc(g.contactoTelefono||''):''}" placeholder="+34 600 000 000"></div>
          </div>
          <div class="field"><label>Email</label><input id="b-email" type="email" value="${g?esc(g.contactoEmail||''):''}" placeholder="contacto@email.com"></div>
          <div class="field"><label>Notas</label><textarea id="b-notas" placeholder="Tarta, alergias, decoración...">${g?esc(g.notas||''):''}</textarea></div>
        </div>
        <div class="modal-foot">
          <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
          <button class="btn btn-primary" onclick="saveBirthdayForm('${g?g.id:''}')">${g?'Guardar cambios':'Crear cumpleaños'}</button>
        </div>
      </div>
    </div>
  `;
}
async function saveBirthdayForm(id){
  const nombre = $('#b-nombre').value.trim();
  if(!nombre){ alert('Ponle un nombre al cumpleañero/a.'); return; }
  const payload = {
    nombre,
    tipo: 'Cumpleaños',
    edad: $('#b-edad').value ? parseInt($('#b-edad').value) : null,
    numPersonas: $('#b-invitados').value ? parseInt($('#b-invitados').value) : null,
    contactoNombre: $('#b-contacto').value.trim(),
    contactoEmail: $('#b-email').value.trim(),
    contactoTelefono: $('#b-tel').value.trim(),
    estado: $('#b-estado').value,
    fechaVisita: $('#b-fecha').value || null,
    horaVisita: $('#b-hora').value || null,
    notas: $('#b-notas').value.trim(),
    updatedAt: new Date().toISOString(),
  };
  if(!state.categories.includes('Cumpleaños')) state.categories.push('Cumpleaños');
  if(id){
    const g = state.groups.find(x=>x.id===id);
    Object.assign(g, payload);
  } else {
    state.groups.push({
      id: uid(),
      ...payload,
      etiquetas: [],
      interacciones: [],
      esperandoRespuesta: false,
      ultimoContacto: null,
      createdAt: new Date().toISOString(),
      createdBy: userName,
    });
  }
  await saveData();
  closeModal();
  if(currentView==='cumpleanos') renderCumpleanos(); else renderDashboard();
}

/* ---------- Campañas ---------- */
function campaignRecipients(camp){
  if(!camp.tiposObjetivo || !camp.tiposObjetivo.length) return [];
  return state.groups.filter(g => camp.tiposObjetivo.includes(g.tipo));
}
function campaignStatusFor(g, camp){
  const sent = (g.interacciones||[]).find(i=>i.campaignId===camp.id);
  if(!sent) return 'pendiente';
  return g.esperandoRespuesta ? 'enviado' : 'respondido';
}
function renderCampanas(){
  $('#page-title').textContent = 'Campañas';
  $('#page-sub').textContent = `${state.campaigns.length} campaña${state.campaigns.length===1?'':'s'}`;
  $('#topbar-actions').innerHTML = `<button class="btn btn-primary" onclick="openCampaignModal()">${plusIcon()} Nueva campaña</button>`;

  const camps = state.campaigns.slice().sort((a,b)=> (b.anio-a.anio) || new Date(b.createdAt)-new Date(a.createdAt));

  $('#view-root').innerHTML = `
    ${camps.length ? `<div class="campaign-grid">
      ${camps.map(c=>{
        const rec = campaignRecipients(c);
        const enviados = rec.filter(g=>campaignStatusFor(g,c)!=='pendiente').length;
        const respondidos = rec.filter(g=>campaignStatusFor(g,c)==='respondido').length;
        return `<div class="campaign-card" onclick="openCampaignDetail('${c.id}')">
          <div class="campaign-card-head">
            <div>
              <div class="campaign-name">${esc(c.nombre)}</div>
              <div class="campaign-year mono">${c.anio}</div>
            </div>
          </div>
          <div class="campaign-tipos">${(c.tiposObjetivo||[]).map(t=>`<span class="pill pill-tipo">${esc(t)}</span>`).join('')}</div>
          <div class="campaign-stats">
            <div><b>${rec.length}</b><span>Destinatarios</span></div>
            <div><b>${enviados}</b><span>Enviados</span></div>
            <div><b>${respondidos}</b><span>Respondidos</span></div>
          </div>
        </div>`;
      }).join('')}
    </div>` : emptyState('Sin campañas todavía', 'Crea una campaña para organizar un envío masivo, por ejemplo "Verano 2026" a los Casales de verano.')}
  `;
}
function openCampaignModal(existing){
  const c = existing || null;
  const currentYear = new Date().getFullYear();
  $('#modal-root').innerHTML = `
    <div class="modal-overlay" onclick="if(event.target===this) closeModal()">
      <div class="modal">
        <div class="modal-head">
          <h2>${c?'Editar campaña':'Nueva campaña'}</h2>
          <button class="icon-btn" onclick="closeModal()">${closeIcon()}</button>
        </div>
        <div class="modal-body">
          <div class="field-row">
            <div class="field"><label>Nombre de la campaña</label><input id="c-nombre" type="text" value="${c?esc(c.nombre):''}" placeholder="Ej: Verano 2026"></div>
            <div class="field"><label>Año</label><input id="c-anio" type="number" value="${c?c.anio:currentYear}"></div>
          </div>
          <div class="field">
            <label>A quién se lo enviaremos (tipos de grupo)</label>
            <div style="display:flex;flex-wrap:wrap;gap:8px;">
              ${state.categories.map(cat=>`
                <label class="checkbox-row" style="background:var(--paper);border:1px solid var(--line-strong);border-radius:8px;padding:6px 10px;">
                  <input type="checkbox" class="c-tipo-check" value="${esc(cat)}" ${c&&c.tiposObjetivo&&c.tiposObjetivo.includes(cat)?'checked':''}> ${esc(cat)}
                </label>
              `).join('')}
            </div>
          </div>
          <div class="field">
            <label>Primer mensaje que enviaremos</label>
            <textarea id="c-mensaje" style="min-height:120px;" placeholder="Escribe aquí el email o mensaje de la campaña...">${c?esc(c.mensaje||''):''}</textarea>
          </div>
        </div>
        <div class="modal-foot">
          <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
          <button class="btn btn-primary" onclick="saveCampaignForm('${c?c.id:''}')">${c?'Guardar cambios':'Crear campaña'}</button>
        </div>
      </div>
    </div>
  `;
}
async function saveCampaignForm(id){
  const nombre = $('#c-nombre').value.trim();
  if(!nombre){ alert('Ponle un nombre a la campaña.'); return; }
  const anio = parseInt($('#c-anio').value) || new Date().getFullYear();
  const tiposObjetivo = $$('.c-tipo-check').filter(el=>el.checked).map(el=>el.value);
  const mensaje = $('#c-mensaje').value.trim();
  if(id){
    const c = state.campaigns.find(x=>x.id===id);
    Object.assign(c, { nombre, anio, tiposObjetivo, mensaje, updatedAt: new Date().toISOString() });
  } else {
    state.campaigns.push({ id: uid(), nombre, anio, tiposObjetivo, mensaje, createdAt: new Date().toISOString(), createdBy: userName });
  }
  await saveData();
  closeModal();
  if(currentView==='campanas') renderCampanas();
}
async function deleteCampaign(id){
  if(!confirm('¿Eliminar esta campaña? El historial de envíos de los grupos no se borra, solo la campaña.')) return;
  state.campaigns = state.campaigns.filter(c=>c.id!==id);
  await saveData();
  closeModal();
  renderCampanas();
}
function openCampaignDetail(id){
  const c = state.campaigns.find(x=>x.id===id);
  if(!c) return;
  const rec = campaignRecipients(c).slice().sort((a,b)=> a.nombre.localeCompare(b.nombre));
  const pendientes = rec.filter(g=>campaignStatusFor(g,c)==='pendiente').length;
  $('#modal-root').innerHTML = `
    <div class="modal-overlay" onclick="if(event.target===this) closeModal()">
      <div class="modal" style="max-width:700px;">
        <div class="modal-head">
          <div>
            <h2>${esc(c.nombre)}</h2>
            <div style="font-size:12.5px;color:var(--text-dim);margin-top:2px;">${c.anio} · ${(c.tiposObjetivo||[]).join(', ')}</div>
          </div>
          <div style="display:flex;gap:6px;">
            <button class="icon-btn" title="Editar" onclick="openCampaignModal(state.campaigns.find(x=>x.id==='${c.id}'))">${editIcon()}</button>
            <button class="icon-btn" title="Cerrar" onclick="closeModal()">${closeIcon()}</button>
          </div>
        </div>
        <div class="modal-body">
          <div class="field"><label>Primer mensaje</label>
            <div style="font-size:13px;color:var(--text-dim);white-space:pre-wrap;background:var(--paper);border-radius:10px;padding:12px 14px;">${c.mensaje?esc(c.mensaje):'Sin mensaje todavía — edita la campaña para añadirlo.'}</div>
          </div>
          <div class="quick-log">
            <button class="btn btn-sm btn-primary" onclick="bulkSendCampaign('${c.id}')" ${pendientes===0?'disabled':''}>${plusIcon()} Marcar ${pendientes} como enviados</button>
          </div>
          <div class="section-title"><h2>Destinatarios</h2><span class="count-pill">${rec.length}</span></div>
          <div class="panel">
            ${rec.length ? rec.map(g=>{
              const st = campaignStatusFor(g,c);
              const stLabel = st==='pendiente'?'Sin enviar':(st==='enviado'?'Enviado · esperando':'Respondió');
              const stClass = st==='pendiente'?'w-cool':(st==='enviado'?'w-warm':'w-hot');
              return `<div class="followup-row" onclick="closeModal();openGroupDetail('${g.id}')">
                <div class="fname">${esc(g.nombre)}<small>${esc(g.tipo)} · ${esc(g.contactoNombre||'sin contacto')}</small></div>
                <span class="wait-badge ${stClass}">${stLabel}</span>
              </div>`;
            }).join('') : emptyState('Sin destinatarios', 'No hay grupos con los tipos seleccionados para esta campaña.')}
          </div>
        </div>
        <div class="modal-foot">
          <button class="btn btn-danger btn-ghost" onclick="deleteCampaign('${c.id}')">Eliminar campaña</button>
          <button class="btn btn-ghost" onclick="closeModal()">Cerrar</button>
        </div>
      </div>
    </div>
  `;
}
async function bulkSendCampaign(id){
  const c = state.campaigns.find(x=>x.id===id);
  if(!c) return;
  const rec = campaignRecipients(c).filter(g=>campaignStatusFor(g,c)==='pendiente');
  if(!rec.length) return;
  if(!confirm(`Vas a marcar como "enviado por email" a ${rec.length} grupos para la campaña "${c.nombre}". ¿Continuar?`)) return;
  const now = new Date().toISOString();
  rec.forEach(g=>{
    g.interacciones = g.interacciones || [];
    g.interacciones.push({ id: uid(), tipo:'email', direccion:'enviado', fecha: now, autor: userName, nota:`Campaña: ${c.nombre}`, esperaRespuesta:true, campaignId: c.id });
    g.ultimoContacto = now;
    g.esperandoRespuesta = true;
    if(g.estado==='nuevo') g.estado = 'contactado';
    g.updatedAt = now;
  });
  await saveData();
  openCampaignDetail(id);
}

/* ---------- Import from Excel ---------- */
function importBanner(){
  if(state.importDone || typeof IMPORT_SEED === 'undefined' || !IMPORT_SEED.length) return '';
  const counts = {};
  IMPORT_SEED.forEach(g => counts[g.tipo] = (counts[g.tipo]||0)+1);
  const breakdown = Object.entries(counts).map(([t,c])=>`${c} ${esc(t)}`).join(' · ');
  return `<div class="panel" style="padding:16px 18px;display:flex;align-items:center;justify-content:space-between;gap:14px;flex-wrap:wrap;border:1px solid var(--violet);">
    <div>
      <div style="font-weight:700;font-size:14px;margin-bottom:3px;">Hay ${IMPORT_SEED.length} contactos del Excel listos para importar</div>
      <div style="font-size:12.5px;color:var(--text-dim);">${breakdown}</div>
    </div>
    <button class="btn btn-primary btn-sm" ${importing?'disabled':''} onclick="runImport()">${importing?'Importando…':'Importar ahora'}</button>
  </div>`;
}
async function runImport(){
  if(importing || typeof IMPORT_SEED === 'undefined') return;
  if(!confirm(`Vas a importar ${IMPORT_SEED.length} contactos del Excel. Se añadirán a los grupos existentes. ¿Continuar?`)) return;
  importing = true;
  renderGrupos();
  const now = new Date().toISOString();
  const newCats = new Set(state.categories);
  IMPORT_SEED.forEach(seed => {
    state.groups.push({
      id: uid(),
      nombre: seed.nombre,
      tipo: seed.tipo,
      numPersonas: seed.numPersonas || null,
      contactoNombre: seed.contactoNombre || '',
      contactoEmail: seed.contactoEmail || '',
      contactoTelefono: seed.contactoTelefono || '',
      estado: seed.estado || 'nuevo',
      fechaVisita: null,
      notas: seed.notas || '',
      etiquetas: [],
      interacciones: [],
      esperandoRespuesta: false,
      ultimoContacto: null,
      createdAt: now,
      updatedAt: now,
      createdBy: 'Importado de Excel',
    });
    newCats.add(seed.tipo);
  });
  state.categories = Array.from(newCats);
  state.importDone = true;
  await saveData();
  importing = false;
  page = 1;
  if(currentView==='grupos') renderGrupos(); else renderDashboard();
}

            </div>
            <input type="text" id="tag-input" placeholder="Escribe una etiqueta y pulsa Enter…">

  `;
  window.__formTags = (g && g.etiquetas) ? g.etiquetas.slice() : [];
  $('#tag-input').addEventListener('keydown', e=>{
    if(e.key==='Enter'){
      e.preventDefault();
      const v = e.target.value.trim();
      if(v) addTagToForm(v);
      e.target.value = '';
    }
  });
  $('#f-tipo').addEventListener('change', e=>{
    if(e.target.value==='__new__'){
      const name = prompt('Nombre del nuevo tipo de grupo:');
      if(name && name.trim()){
        if(!state.categories.includes(name.trim())) state.categories.push(name.trim());
        openGroupModal(g ? {...g, tipo:name.trim()} : {tipo:name.trim()});
      } else {
        e.target.value = state.categories[0];
      }

  });

async function saveGroupForm(id){
  const nombre = $('#f-nombre').value.trim();
  if(!nombre){ alert('Ponle un nombre al grupo.'); return; }
  const tipoVal = $('#f-tipo').value === '__new__' ? state.categories[0] : $('#f-tipo').value;
  const payload = {
    nombre,
    tipo: tipoVal,
    numPersonas: $('#f-num').value ? parseInt($('#f-num').value) : null,
    contactoNombre: $('#f-contacto').value.trim(),
    contactoEmail: $('#f-email').value.trim(),
    contactoTelefono: $('#f-tel').value.trim(),
    estado: $('#f-estado').value,
    fechaVisita: $('#f-fecha').value || null,
    horaVisita: $('#f-hora').value || null,
    etiquetas: (window.__formTags||[]).slice(),
    notas: $('#f-notas').value.trim(),
    updatedAt: new Date().toISOString(),
  };
  if(id){
    const g = state.groups.find(x=>x.id===id);
    Object.assign(g, payload);
  } else {
    state.groups.push({
      id: uid(),
      ...payload,
      interacciones: [],
      esperandoRespuesta: false,
      ultimoContacto: null,
      createdAt: new Date().toISOString(),
      createdBy: userName,
    });
  }
  await saveData();
  closeModal();
  if(currentView==='grupos') renderGrupos(); else renderDashboard();
  if(id) openGroupDetail(id);
}

function closeModal(){ $('#modal-root').innerHTML = ''; }

/* ---------- Tags ---------- */
function tagPillHtml(t){
  const cls = SPECIAL_TAG_CLASS[t] || '';
  return `<span class="tag-pill ${cls}">${esc(t)}<button type="button" onclick="removeTagFromForm('${esc(t).replace(/'/g,"\\'")}')" aria-label="Quitar">×</button></span>`;
}
function addTagToForm(t){
  window.__formTags = window.__formTags || [];
  if(!window.__formTags.includes(t)) window.__formTags.push(t);
  $('#tag-pills').innerHTML = window.__formTags.map(t=>tagPillHtml(t)).join('');
}
function removeTagFromForm(t){
  window.__formTags = (window.__formTags||[]).filter(x=>x!==t);
  $('#tag-pills').innerHTML = window.__formTags.map(t=>tagPillHtml(t)).join('');
}
function closeIcon(){ return `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M18 6 6 18M6 6l12 12"/></svg>`; }

                <div class="tl-ico">${iconSvg(TIPO_INTERACCION.find(t=>t.id===i.tipo)?.icon||'mail')}</div>
                <div class="tl-body">
                  <div class="tl-top">
                    <span class="who">${TIPO_INTERACCION.find(t=>t.id===i.tipo)?.label} · ${i.direccion==='recibido'?'recibido':'enviado'} · ${esc(i.autor)}</span>
                    <span class="when mono">${fmtDate(i.fecha)}</span>
                  </div>
                  ${i.nota?`<div class="tl-note">${esc(i.nota)}</div>`:''}
                  ${i.esperaRespuesta?`<span class="tl-flag">Quedó pendiente de respuesta</span>`:''}
                </div>
              </div>
            `).join('') : emptyState('Sin historial', 'Registra el primer contacto con este grupo arriba.')}
          </div>

          <div class="field" style="margin-top:16px;">
            <label>Añadir nota manual al historial</label>
            <textarea id="manual-note" placeholder="Escribe una nota y elige el tipo abajo…"></textarea>
            <div class="field-row" style="margin-top:8px;">
              <select id="manual-tipo">${TIPO_INTERACCION.map(t=>`<option value="${t.id}">${t.label}</option>`).join('')}</select>
              <select id="manual-dir"><option value="enviado">Enviado</option><option value="recibido">Recibido</option></select>
            </div>
            <label class="checkbox-row" style="margin-top:10px;"><input type="checkbox" id="manual-espera"> Queda pendiente de respuesta</label>
            <button class="btn btn-sm" style="margin-top:10px;" onclick="addManualNote('${g.id}')">Añadir al historial</button>
          </div>
        </div>
        <div class="modal-foot">
          <button class="btn btn-danger btn-ghost" onclick="deleteGroup('${g.id}')">Eliminar grupo</button>
          <button class="btn btn-ghost" onclick="closeModal()">Cerrar</button>
        </div>
      </div>
    </div>
  `;
  if((g.capturas||[]).length) loadCapturaThumbnails();
}
function editIcon(){ return `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>`; }

/* ---------- Capturas de conversación ---------- */
async function loadCapturaThumbnails(){
  const nodes = $$('.captura-thumb');
  for(const node of nodes){
    const key = node.dataset.shotKey;
    const loadingEl = node.querySelector('.captura-loading');
    try{
      const r = await kvGet(key);
      if(r && r.value && loadingEl){
        const img = document.createElement('img');
        img.src = r.value;
        img.alt = 'Captura';
        loadingEl.replaceWith(img);
      }
    }catch(e){
      if(loadingEl) loadingEl.textContent = 'Error';
    }
  }
}
function resizeImageFile(file){
  return new Promise((resolve, reject)=>{
    const img = new Image();
    const reader = new FileReader();
    reader.onload = e => { img.src = e.target.result; };
    reader.onerror = reject;
    img.onload = () => {
      const maxW = 1000;
      const scale = Math.min(1, maxW / img.width);
      const canvas = document.createElement('canvas');
      canvas.width = img.width * scale;
      canvas.height = img.height * scale;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
      resolve(canvas.toDataURL('image/jpeg', 0.78));
    };
    img.onerror = reject;
    reader.readAsDataURL(file);
  });
}
async function handleCapturaFile(groupId, input){
  const file = input.files && input.files[0];
  if(!file) return;
  const g = state.groups.find(x=>x.id===groupId);
  if(!g) return;
  let dataUrl;
  try{
    dataUrl = await resizeImageFile(file);
  }catch(e){
    alert('No se ha podido procesar la imagen.');
    return;
  }
  const shotId = uid();
  const key = `shot-${groupId}-${shotId}`;
  try{
    const res = await kvSet(key, dataUrl);
    if(!res){ alert('No se ha podido guardar la captura.'); return; }
  }catch(e){
    alert('No se ha podido guardar la captura.');
    return;
  }
  g.capturas = g.capturas || [];
  g.capturas.push({ id: shotId, key, nombre: file.name, fecha: new Date().toISOString() });
  g.updatedAt = new Date().toISOString();
  await saveData();
  openGroupDetail(groupId);
}
async function deleteCaptura(groupId, shotId){
  const g = state.groups.find(x=>x.id===groupId);
  if(!g) return;
  const c = (g.capturas||[]).find(x=>x.id===shotId);
  if(!c) return;
  if(!confirm('¿Eliminar esta captura?')) return;
  try{
    await kvDelete(c.key);
  }catch(e){ /* key may already be gone */ }
  g.capturas = (g.capturas||[]).filter(x=>x.id!==shotId);
  g.updatedAt = new Date().toISOString();
  await saveData();
  openGroupDetail(groupId);
}

async function quickLog(groupId, tipo, direccion){
  const g = state.groups.find(x=>x.id===groupId);
  if(!g) return;
  const esperaRespuesta = direccion==='enviado';
  g.interacciones = g.interacciones || [];
  g.interacciones.push({ id: uid(), tipo, direccion, fecha: new Date().toISOString(), autor: userName, nota:'', esperaRespuesta });
  g.ultimoContacto = new Date().toISOString();
  g.esperandoRespuesta = esperaRespuesta;
  g.recordatorioFecha = null;
  if(g.estado==='nuevo') g.estado = 'contactado';
  g.updatedAt = new Date().toISOString();
  await saveData();
  openGroupDetail(groupId);
}
async function addManualNote(groupId){
  const g = state.groups.find(x=>x.id===groupId);
  if(!g) return;
  const nota = $('#manual-note').value.trim();
  const tipo = $('#manual-tipo').value;
  const direccion = $('#manual-dir').value;
  const espera = $('#manual-espera').checked;
  if(!nota && !espera){ alert('Escribe una nota o marca "pendiente de respuesta".'); return; }
  g.interacciones = g.interacciones || [];
  g.interacciones.push({ id: uid(), tipo, direccion, fecha: new Date().toISOString(), autor: userName, nota, esperaRespuesta: espera });
  g.ultimoContacto = new Date().toISOString();
  g.esperandoRespuesta = direccion==='recibido' ? false : espera;
  g.recordatorioFecha = null;
  if(g.estado==='nuevo') g.estado = 'contactado';
  g.updatedAt = new Date().toISOString();
  await saveData();
  openGroupDetail(groupId);
}
async function deleteGroup(id){
  if(!confirm('¿Seguro que quieres eliminar este grupo? Se perderá todo su historial.')) return;
  state.groups = state.groups.filter(g=>g.id!==id);
  await saveData();
  closeModal();
  if(currentView==='grupos') renderGrupos(); else renderDashboard();
}

init();
</script>
